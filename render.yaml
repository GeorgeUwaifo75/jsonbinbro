services:
  - type: web
    name: jsonbinbro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: jsonbin_clone