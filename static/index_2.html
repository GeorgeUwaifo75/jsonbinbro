<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONBinBro - JSON Storage Platform</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-database"></i> JSONBinBro</h1>
            <p class="tagline" style="font-size: 1.2rem; margin-top: -10px; margin-bottom: 20px;">We make storage and retrieval even fun! 🚀</p>
            <p>Simple REST API for JSON storage - Create, Read, Update, Delete</p>
        </header>

        <!-- User Info Bar -->
        <div id="userInfoBar" style="background: white; border-radius: 10px; padding: 15px 25px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <i class="fas fa-user-circle"></i> Welcome, <span id="usernameDisplay">User</span>
                <span id="userRole" style="margin-left: 10px; padding: 3px 8px; border-radius: 3px; font-size: 12px;"></span>
            </div>
            <div>
                <span id="requestStats" style="margin-right: 15px;"></span>
                <button onclick="logout()" style="background: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
            </div>
        </div>

        <div class="create-section card">
            <h2>Create New Bin</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>Bin Name (Optional)</label>
                    <input type="text" id="binName" placeholder="My Awesome Bin">
                </div>
                <div class="form-group">
                    <label>JSON Data</label>
                    <textarea id="jsonData" rows="5" placeholder='{"key": "value"}' required>{"message": "Hello World!"}</textarea>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="isPrivate"> Private Bin (requires access key for read/update/delete)
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Create Bin <i class="fas fa-plus"></i></button>
            </form>
        </div>

        <div class="bins-section">
            <h2>Your Bins <i class="fas fa-list"></i></h2>
            <div id="binsList" class="bins-grid"></div>
        </div>
    </div>

    <!-- Modal for viewing/editing bin -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Bin Details</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="text-align: center; padding: 20px; color: white; margin-top: 40px;">
        <p>Email: geocorpsys@gmail.com | © 2026 JSONBinBro</p>
        <p>Payments: PayPal, TonWallet, PayStack</p>
    </footer>



    <script src="/static/script.js"></script>
    <script>
    // Check authentication on page load
    const userId = localStorage.getItem('userId');
    const apiKey = localStorage.getItem('apiKey');
    const username = localStorage.getItem('username');
    const userRole = localStorage.getItem('role');
    const requestCount = localStorage.getItem('requestCount');
    const requestLimit = localStorage.getItem('requestLimit');

    if (!userId || !apiKey) {
        window.location.href = '/login';
    }

    // Only set if elements exist and not already set by script.js
    if (!document.getElementById('usernameDisplay').innerText || document.getElementById('usernameDisplay').innerText === 'User') {
        document.getElementById('usernameDisplay').textContent = username;
        document.getElementById('userRole').textContent = userRole === 'admin' ? 'Admin' : 'User';
        document.getElementById('userRole').style.background = userRole === 'admin' ? '#dc3545' : '#28a745';
        document.getElementById('userRole').style.color = 'white';
        document.getElementById('requestStats').innerHTML = `<i class="fas fa-chart-line"></i> Requests: ${requestCount}/${requestLimit}`;
    }

      function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

</script>


</body>
</html>
